<!DOCTYPE html>
<html lang="en">
<head>

	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />

	<title>{{ if not .IsHome }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>

  <!-- css stylesheets -->
	<link rel="stylesheet" href="/css/style.css" type="text/css" media="all" />
	<link rel="stylesheet" href="/css/theme.css" type="text/css" media="all" />
	<link rel="stylesheet" href="/css/fonts.css" type="text/css" media="all" />
	<link rel="stylesheet" href="/css/math.css" type="text/css" media="all" />
	<link rel="stylesheet" href="/css/images.css" type="text/css" media="all" />

  <!-- Icon for Website -->
  <!-- <link rel="icon" href="https://drive.google.com/uc?id=1AJ_qV9NvoeAtKe1kms2qq7QPIxb0ShwN"/> -->
  <link rel="icon" href="https://drive.google.com/uc?id=1iY7dweJbxRAfOagKffo2U78Q3lhqfsxU"/>

	{{ with .OutputFormats.Get "rss" -}}
		{{ printf `<link rel="%s" type="%s" href="%s" title="%s" />` .Rel .MediaType.Type .Permalink $.Site.Title | safeHTML }}
	{{ end -}}

</head>

<body>

{{ partial "nav.html" . }}

{{ if or .Params.math .Site.Params.math }}
  {{ partial "math.html" . }}
{{ end }}

<main class="content">
