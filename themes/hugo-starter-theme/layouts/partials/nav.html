<header class="site-header">
    <a class="logo" href="{{ .Site.BaseURL }}">
      {{ partial "image-input" (dict "image" "imgLogo" "size" "logo-size") }}
      {{ .Site.Title }}
    </a>
  <nav class="site-nav">
    <!-- <a class="logo" href="{{ .Site.BaseURL }}"> -->
    <!--   {{ .Site.Title }} -->
    <!-- </a> -->
    <ul class="main-menu">
      {{ range.Site.Menus.main }}
      <li>
        <a href="{{ .URL }}">{{ .Name }}</a>
      </li>
      {{ end }}
    </ul>
  </nav>
</header>
