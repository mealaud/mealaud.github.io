<div class="grid-container">
  <div id="nav-grid">
    {{ partial "header.html" . }}
  </div>    
  <div id="content-grid">
    <article>
      <header>
        <h1>{{ .Title }}</h1>

    {{ partial "landinglists.html" . }}

    {{ partial "recentposts.html" . }}

    {{ partial "footer.html" . }}
  </div>    
</div>
