<ul>
{{ range .RegularPagesRecursive.ByPublishDate.Reverse }}
<li>
  <a href="{{ .Permalink }}" style="text-decoration: none">{{ .Title }}</a> <span style="opacity: 0.5; font-size: 0.7em">    {{ .PublishDate.Format "Monday, January 2, 2006" }}</span>
  {{ if ne .Lastmod .PublishDate }}
    <span style="opacity: 0.5; font-size: 0.7em"> | Last modified: {{ .Lastmod.Format "2006-01-02"}}</span>
  {{ end }}
</li>
{{ end }}
</ul>
 <!-- | Last modified: {{ .Lastmod.Format "2006-01-02"}}</span> -->
